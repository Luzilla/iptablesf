version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: /
    schedule:
      interval: weekly
    groups:
      action-deps:
        patterns:
          - "*"
    cooldown:
      default-days: 7
  - package-ecosystem: "gomod"
    directory: /
    schedule:
      interval: weekly
    groups:
      go:
        patterns:
          - minor
          - patch
    cooldown:
      default-days: 7
